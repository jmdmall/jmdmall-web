<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details - JMD Mall</title>
<link rel="stylesheet" href="css/style.css">

<style>
/* Standardized product detail spacing and Flipkart/Amazon-like buttons/icons */
.product-page{
    max-width:1400px;
    margin:28px auto;
    padding:24px;
}

.product-detail-card{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:32px;
    background:#fff;
    padding:28px;
    border-radius:12px;
    box-shadow:0 6px 20px rgba(0,0,0,.06);
}

/* Gallery styles - larger main image with neutral background */
.gallery-column{
    display:flex;
    flex-direction:column;
    gap:14px;
}
.main-image-wrap{
    position:relative;
    background:#fff;
    border-radius:8px;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    border:1px solid var(--border-color);
}
.main-image-wrap img{
    width:100%;
    height:480px;
    object-fit:contain;
    background:#fff;
}
.gallery-thumbs{
    display:flex;
    gap:10px;
    overflow-x:auto;
    padding-top:8px;
}
.thumb{
    width:72px;
    height:72px;
    flex:0 0 auto;
    border-radius:6px;
    overflow:hidden;
    border:2px solid transparent;
    cursor:pointer;
}
.thumb img{
    width:100%;
    height:100%;
    object-fit:cover;
}
.thumb.active{ border-color:#ff9900; }

/* nav arrows */
.nav-arrow{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(0,0,0,0.45);
    color:#fff;
    border:none;
    width:40px;
    height:40px;
    border-radius:50%;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
}
.nav-left{ left:12px; }
.nav-right{ right:12px; }

/* Details column */
.details-column{ padding:8px; }
.details-column h1{
    font-size:1.65rem;
    margin:6px 0 8px 0;
    line-height:1.15;
}

.product-meta{
    display:flex;
    align-items:center;
    gap:12px;
    color:var(--text-light);
    font-size:0.95rem;
}

/* Price row - inline MRP, selling price, discount percent and rating */
.price-row{
    display:flex;
    align-items:baseline;
    gap:10px;
    margin-top:12px;
}

.mrp{
    text-decoration:line-through;
    color:#777;
    font-size:0.95rem;
}

.sell-price{
    font-size:28px;
    font-weight:800;
    color:#e63946;
}

.discount-percent{
    font-size:0.95rem;
    color:#388e3c;
    font-weight:700;
    background:rgba(56,142,60,0.08);
    padding:4px 8px;
    border-radius:6px;
}

/* Flat rupee-off small pill near price */
.flat-discount-pill{
    font-size:0.85rem;
    background:#28a745;
    color:#fff;
    padding:6px 8px;
    border-radius:6px;
    font-weight:700;
}

/* Quantity selector */
.quantity-selector {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 16px 0;
}

.quantity-selector label {
    font-weight: 600;
    color: var(--text-dark);
}

.quantity-selector input {
    width: 60px;
    padding: 8px 12px;
    border: 1px solid var(--border-color);
    border-radius: 6px;
    text-align: center;
    font-size: 1rem;
}

/* Action buttons - standard look */
.cta-group{
    display:flex;
    gap:12px;
    margin-top:18px;
    align-items:center;
    flex-wrap: wrap;
}

.whatsapp-btn, .cart-btn, .share-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:12px 16px;
    border-radius:6px;
    font-weight:700;
    cursor:pointer;
    border:none;
    text-decoration:none;
    color:#fff;
    transition: all 0.2s;
}

.whatsapp-btn{ background:#25D366; }
.whatsapp-btn:hover{ background:#1fa753; }
.cart-btn{ background:#146EB4; }
.cart-btn:hover{ background:#0f4a7a; }
.share-btn{ background:transparent; color:var(--text-dark); border:1px solid var(--border-color); padding:10px 12px; font-weight:600; }
.share-btn:hover{ background: var(--bg-gray); }

/* Assured box and detail table spacing */
.detail-table{ margin-top:20px; display:grid; gap:10px; }
.detail-table div{ padding:8px 0; border-bottom:1px solid #f1f1f1; }
.assured-box{ margin-top:20px; padding:16px; background:#f8f9fa; border-radius:8px; }

/* Rating small star icon */
.star{ color:#f39c12; margin-right:6px; }

/* Notification */
.notification-bar {
    padding: 12px 16px;
    margin-bottom: 12px;
    border-radius: 6px;
    display: none;
}

.notification-bar.success {
    background: #d4edda;
    color: #155724;
    border: 1px solid #c3e6cb;
    display: block;
}

/* Responsive adjustments */
@media(max-width:900px){
    .product-detail-card{ grid-template-columns:1fr; }
    .main-image-wrap img{ height:360px; }
    .thumb{ width:64px; height:64px; }
}
@media(max-width:480px){
    .main-image-wrap img{ height:240px; }
    .thumb{ width:52px; height:52px; }
    .details-column h1{ font-size:1.25rem; }
    .sell-price{ font-size:22px; }
    .cta-group { flex-direction: column; }
    .whatsapp-btn, .cart-btn { width: 100%; justify-content: center; }
}

</style>

</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <div class="nav-logo">
            <a href="index.html">JMD Mall</a>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="cart.html" class="nav-link">Cart</a>
        </div>
    </div>
</nav>

<main class="product-page">

<div id="productContainer">Loading Product...</div>

</main>

<script>
const CSV_URL = 'products.csv';
const WHATSAPP = '9779705446407';
const PLACEHOLDER = 'images/placeholder.svg';

async function loadProduct(){
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    try{
        const res = await fetch(CSV_URL);
        if(!res.ok) throw new Error('CSV not found');
        const csv = await res.text();
        const products = parseCSV(csv);
        const product = products.find(p=>p.id===id);
        if(!product){
            document.getElementById('productContainer').innerHTML = '<h2>Product Not Found</h2>';
            return;
        }
        renderProduct(product);
    }catch(err){
        console.error(err);
        document.getElementById('productContainer').innerHTML = '<h2>Unable to load product</h2>';
    }
}

// robust CSV parsing helpers (handles quoted fields)
function parseCSV(csvText){
    const lines = csvText.trim().split(/\r?\n/).filter(Boolean);
    if(!lines.length) return [];

    const headers = parseCSVLine(lines[0]).map(h=>h.trim());
    const data = [];

    for(let i=1;i<lines.length;i++){
        if(!lines[i].trim()) continue;
        const values = parseCSVLine(lines[i]);
        const obj = {};
        headers.forEach((h,idx)=>{
            obj[h] = values[idx] ? values[idx].trim() : '';
        });
        // build images array
        const images = [];
        if(obj.main_image) images.push(obj.main_image);
        ['img2','img3','img4','img5','img6'].forEach(k=>{ if(obj[k] && obj[k].trim()) images.push(obj[k].trim()); });
        if(obj.image && !images.length) images.push(obj.image);
        obj.images = images;
        obj.image = images[0] || obj.image || PLACEHOLDER;
        data.push(obj);
    }
    return data;
}

function parseCSVLine(line){
    const result = [];
    let cur = '';
    let inQuotes = false;
    for(let i=0;i<line.length;i++){
        const ch = line[i];
        if(ch==='"'){
            if(inQuotes && line[i+1]==='"'){
                cur += '"';
                i++;
            }else{
                inQuotes = !inQuotes;
            }
            continue;
        }
        if(ch===',' && !inQuotes){
            result.push(cur);
            cur = '';
            continue;
        }
        cur += ch;
    }
    result.push(cur);
    return result;
}

function renderProduct(product){
    const images = product.images && product.images.length > 0 ? product.images : [product.image || PLACEHOLDER];
    const mrp = Number(product.mrp || 0);
    const selling = Number(product.selling_price || 0);
    const discountPercent = mrp > 0 ? Math.round(((mrp - selling) / mrp) * 100) : 0;
    const flatDiscount = Number(product.discount_amount || 0);

    const html = `
    <div class="product-detail-card">
        <div class="gallery-column">
            <div class="main-image-wrap">
                <img id="mainImage" src="${images[0]}" alt="${escapeHTML(product.name)}" onerror="this.src='${PLACEHOLDER}'">
                ${images.length > 1 ? `
                    <button class="nav-arrow nav-left" onclick="prevImage()">❮</button>
                    <button class="nav-arrow nav-right" onclick="nextImage()">❯</button>
                ` : ''}
            </div>
            ${images.length > 1 ? `
                <div class="gallery-thumbs" id="thumbsContainer">
                    ${images.map((img, i) => `
                        <div class="thumb ${i === 0 ? 'active' : ''}" onclick="changeImage(${i})">
                            <img src="${img}" alt="Image ${i+1}" onerror="this.src='${PLACEHOLDER}'">
                        </div>
                    `).join('')}
                </div>
            ` : ''}
        </div>

        <div class="details-column">
            <h1>${escapeHTML(product.name)}</h1>
            
            <div class="product-meta">
                <span>⭐ ${product.rating || '5'} (${product.reviews || '0'} reviews)</span>
                <span>Category: ${escapeHTML(product.category || 'General')}</span>
            </div>

            <div class="price-row">
                ${mrp > 0 ? `<span class="mrp">₹${formatPrice(mrp)}</span>` : ''}
                <span class="sell-price">₹${formatPrice(selling)}</span>
                ${discountPercent > 0 ? `<span class="discount-percent">${discountPercent}% OFF</span>` : ''}
            </div>

            ${flatDiscount > 0 ? `<div class="flat-discount-pill">Save ₹${formatPrice(flatDiscount)}</div>` : ''}

            <div class="quantity-selector">
                <label for="quantityInput">Quantity:</label>
                <input type="number" id="quantityInput" min="1" max="100" value="1">
            </div>

            <div id="notification" class="notification-bar"></div>

            <div class="cta-group">
                <button class="cart-btn" onclick="addProductToCart('${escapeAttr(JSON.stringify({
                    id: product.id,
                    name: product.name,
                    selling_price: selling,
                    image: images[0]
                }))}')">
                    🛒 Add to Cart
                </button>
                <a href="https://wa.me/${WHATSAPP}?text=Hi%20JMD%20Mall%2C%20I%20am%20interested%20in%20${encodeURIComponent(product.name)}%20(Product%20ID%3A%20${product.id})" target="_blank" class="whatsapp-btn">
                    💬 WhatsApp
                </a>
            </div>

            <div class="detail-table">
                <div><strong>Brand:</strong> ${escapeHTML(product.brand || 'N/A')}</div>
                <div><strong>Stock:</strong> ${product.stock ? '✅ In Stock' : '❌ Out of Stock'}</div>
            </div>

            ${product.description ? `
                <div class="assured-box">
                    <strong>Description:</strong>
                    <p style="margin-top: 8px; line-height: 1.6;">${escapeHTML(product.description)}</p>
                </div>
            ` : ''}

            <div class="assured-box">
                <div>✅ JMDMall Assured</div>
                <div style="margin-top: 8px;">🚚 Fast Delivery</div>
                <div style="margin-top: 8px;">💵 Cash on Delivery Available</div>
            </div>
        </div>
    </div>
    `;

    document.getElementById('productContainer').innerHTML = html;
    setupImageGallery(images);
}

let currentImageIndex = 0;
let productImages = [];

function setupImageGallery(images) {
    productImages = images;
    currentImageIndex = 0;
}

function changeImage(index) {
    currentImageIndex = index;
    document.getElementById('mainImage').src = productImages[index];
    document.querySelectorAll('.thumb').forEach((thumb, i) => {
        thumb.classList.toggle('active', i === index);
    });
}

function nextImage() {
    currentImageIndex = (currentImageIndex + 1) % productImages.length;
    changeImage(currentImageIndex);
}

function prevImage() {
    currentImageIndex = (currentImageIndex - 1 + productImages.length) % productImages.length;
    changeImage(currentImageIndex);
}

function addProductToCart(productJson) {
    try {
        const product = JSON.parse(productJson);
        const quantity = parseInt(document.getElementById('quantityInput').value) || 1;
        
        // Call cart.js function
        if (typeof addToCart === 'function') {
            addToCart(product, quantity);
        } else {
            // Fallback if cart.js not loaded
            const CART_KEY = 'jmdmall_cart_v1';
            const cart = JSON.parse(localStorage.getItem(CART_KEY) || '[]');
            const existing = cart.find(item => item.id === product.id);
            
            if (existing) {
                existing.quantity += quantity;
            } else {
                cart.push({ ...product, quantity });
            }
            
            localStorage.setItem(CART_KEY, JSON.stringify(cart));
            showNotification('✅ Product added to cart!');
            setTimeout(() => {
                window.location.href = 'cart.html';
            }, 500);
        }
    } catch (e) {
        console.error('Error adding to cart:', e);
        showNotification('Error adding to cart', 'error');
    }
}

function showNotification(message, type = 'success') {
    const notif = document.getElementById('notification');
    notif.textContent = message;
    notif.className = `notification-bar ${type}`;
    setTimeout(() => {
        notif.className = 'notification-bar';
    }, 3000);
}

function formatPrice(price) {
    return Number(price || 0).toLocaleString('en-IN');
}

function escapeHTML(text) {
    if (!text) return '';
    const map = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'};
    return String(text).replace(/[&<>"']/g, m => map[m]);
}

function escapeAttr(text) {
    return text.replace(/'/g, '&#39;').replace(/"/g, '&quot;');
}

// Load product on page load
document.addEventListener('DOMContentLoaded', loadProduct);
</script>

<script src="js/cart.js"></script>

</body>
</html>
