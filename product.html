<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details - JMD Mall</title>
<link rel="stylesheet" href="css/style.css">

<style>
/* Standardized product detail spacing and Flipkart/Amazon-like buttons/icons */
.product-page{
    max-width:1400px;
    margin:28px auto;
    padding:24px;
}

.product-detail-card{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:32px;
    background:#fff;
    padding:28px;
    border-radius:12px;
    box-shadow:0 6px 20px rgba(0,0,0,.06);
}

/* Gallery styles - larger main image with neutral background */
.gallery-column{
    display:flex;
    flex-direction:column;
    gap:14px;
}
.main-image-wrap{
    position:relative;
    background:#fff;
    border-radius:8px;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    border:1px solid var(--border-color);
}
.main-image-wrap img{
    width:100%;
    height:480px;
    object-fit:contain;
    background:#fff;
}
.gallery-thumbs{
    display:flex;
    gap:10px;
    overflow-x:auto;
    padding-top:8px;
}
.thumb{
    width:72px;
    height:72px;
    flex:0 0 auto;
    border-radius:6px;
    overflow:hidden;
    border:2px solid transparent;
    cursor:pointer;
}
.thumb img{
    width:100%;
    height:100%;
    object-fit:cover;
}
.thumb.active{ border-color:#ff9900; }

/* nav arrows */
.nav-arrow{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(0,0,0,0.45);
    color:#fff;
    border:none;
    width:40px;
    height:40px;
    border-radius:50%;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
}
.nav-left{ left:12px; }
.nav-right{ right:12px; }

/* Details column */
.details-column{ padding:8px; }
.details-column h1{
    font-size:1.65rem;
    margin:6px 0 8px 0;
    line-height:1.15;
}

.product-meta{
    display:flex;
    align-items:center;
    gap:12px;
    color:var(--text-light);
    font-size:0.95rem;
}

/* Price row - inline MRP, selling price, discount percent and rating */
.price-row{
    display:flex;
    align-items:baseline;
    gap:10px;
    margin-top:12px;
}

.mrp{
    text-decoration:line-through;
    color:#777;
    font-size:0.95rem;
}

.sell-price{
    font-size:28px;
    font-weight:800;
    color:#e63946;
}

.discount-percent{
    font-size:0.95rem;
    color:#388e3c;
    font-weight:700;
    background:rgba(56,142,60,0.08);
    padding:4px 8px;
    border-radius:6px;
}

/* Flat rupee-off small pill near price */
.flat-discount-pill{
    font-size:0.85rem;
    background:#28a745;
    color:#fff;
    padding:6px 8px;
    border-radius:6px;
    font-weight:700;
}

/* Action buttons - standard look */
.cta-group{
    display:flex;
    gap:12px;
    margin-top:18px;
    align-items:center;
}

.whatsapp-btn, .cart-btn, .share-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:12px 16px;
    border-radius:6px;
    font-weight:700;
    cursor:pointer;
    border:none;
    text-decoration:none;
    color:#fff;
}

.whatsapp-btn{ background:#25D366; }
.cart-btn{ background:#146EB4; }
.share-btn{ background:transparent; color:var(--text-dark); border:1px solid var(--border-color); padding:10px 12px; font-weight:600; }

/* Assured box and detail table spacing */
.detail-table{ margin-top:20px; display:grid; gap:10px; }
.detail-table div{ padding:8px 0; border-bottom:1px solid #f1f1f1; }
.assured-box{ margin-top:20px; padding:16px; background:#f8f9fa; border-radius:8px; }

/* Rating small star icon */
.star{ color:#f39c12; margin-right:6px; }

/* Responsive adjustments */
@media(max-width:900px){
    .product-detail-card{ grid-template-columns:1fr; }
    .main-image-wrap img{ height:360px; }
    .thumb{ width:64px; height:64px; }
}
@media(max-width:480px){
    .main-image-wrap img{ height:240px; }
    .thumb{ width:52px; height:52px; }
    .details-column h1{ font-size:1.25rem; }
    .sell-price{ font-size:22px; }
}

</style>

</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <div class="nav-logo">
            <a href="index.html">JMD Mall</a>
        </div>
    </div>
</nav>

<main class="product-page">

<div id="productContainer">Loading Product...</div>

</main>

<script>
const CSV_URL = 'products.csv';
const WHATSAPP = '9779705446407';
const PLACEHOLDER = 'images/placeholder.svg';

async function loadProduct(){
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    try{
        const res = await fetch(CSV_URL);
        if(!res.ok) throw new Error('CSV not found');
        const csv = await res.text();
        const products = parseCSV(csv);
        const product = products.find(p=>p.id===id);
        if(!product){
            document.getElementById('productContainer').innerHTML = '<h2>Product Not Found</h2>';
            return;
        }
        renderProduct(product);
    }catch(err){
        console.error(err);
        document.getElementById('productContainer').innerHTML = '<h2>Unable to load product</h2>';
    }
}

// robust CSV parsing helpers (handles quoted fields)
function parseCSV(csvText){
    const lines = csvText.trim().split(/\r?\n/).filter(Boolean);
    if(!lines.length) return [];

    const headers = parseCSVLine(lines[0]).map(h=>h.trim());
    const data = [];

    for(let i=1;i<lines.length;i++){
        if(!lines[i].trim()) continue;
        const values = parseCSVLine(lines[i]);
        const obj = {};
        headers.forEach((h,idx)=>{
            obj[h] = values[idx] ? values[idx].trim() : '';
        });
        // build images array
        const images = [];
        if(obj.main_image) images.push(obj.main_image);
        ['img2','img3','img4','img5','img6'].forEach(k=>{ if(obj[k] && obj[k].trim()) images.push(obj[k].trim()); });
        if(obj.image && !images.length) images.push(obj.image);
        obj.images = images;
        obj.image = images[0] || obj.image || PLACEHOLDER;
        data.push(obj);
    }
    return data;
}

function parseCSVLine(line){
    const result = [];
    let cur = '';
    let inQuotes = false;
    for(let i=0;i<line.length;i++){
        const ch = line[i];
        if(ch==='"'){
            if(inQuotes && line[i+1]==='"'){ cur += '"'; i++; }
            else { inQuotes = !inQuotes; }
            continue;
        }
        if(ch===',' && !inQuotes){ result.push(cur); cur = ''; continue; }
        cur += ch;
    }
    result.push(cur);
    return result;
}

function renderProduct(product){
    // prepare values
    const mrp = parseFloat(product.mrp)||0;
    const selling = parseFloat(product.selling_price)||0;
    const seasonal = parseFloat(product.discount_amount||0)||0;
    const discount = mrp ? Math.round(((mrp-selling)/mrp)*100) : 0;
    const hotDeal = discount>49;
    const deliveryDate = new Date(); deliveryDate.setDate(deliveryDate.getDate()+7);

    const shippingText = (product.shipping === '0' || product.shipping==='') ? 'Free Shipping' : '₹'+product.shipping;
    const stockText = (Number(product.stock) <= 0) ? '<span class="out-stock">Out Of Stock</span>' : '<span class="in-stock">In Stock ('+product.stock+')</span>';

    // images
    const images = (product.images && product.images.length) ? product.images : [product.image || PLACEHOLDER];

    // build gallery HTML
    const galleryHtml = `
    <div class="product-detail-card">
        <div class="gallery-column">
            <div class="main-image-wrap">
                <button class="nav-arrow nav-left" id="prevImg" aria-label="Previous image">&#10094;</button>
                <img id="mainProductImage" src="${escapeHtml(images[0])}" alt="${escapeHtml(product.name)}" onerror="this.src='${PLACEHOLDER}'">
                <button class="nav-arrow nav-right" id="nextImg" aria-label="Next image">&#10095;</button>
            </div>
            <div class="gallery-thumbs" id="galleryThumbs">
                ${images.map((src,idx)=>`<div class="thumb ${idx===0? 'active':''}" data-index="${idx}"><img src="${escapeHtml(src)}" onerror="this.src='${PLACEHOLDER}'" loading="lazy"/></div>`).join('')}
            </div>
        </div>

        <div class="details-column">
            ${hotDeal ? '<div class="hot-deal">🔥 HOT DEAL</div>' : ''}

            <h1>${escapeHtml(product.name)}</h1>

            <div class="product-meta">
                <div class="rating"><span class="star">★</span> ${escapeHtml(product.rating || '5')}</div>
                <div class="reviews">(${escapeHtml(product.reviews || '0')} Reviews)</div>
            </div>

            <div class="price-row">
                <span class="mrp">₹${mrp.toLocaleString('en-IN')}</span>
                <span class="sell-price">₹${selling.toLocaleString('en-IN')}</span>
                ${discount>0 ? `<span class="discount-percent">${discount}% OFF</span>` : ''}
                ${seasonal>0 ? `<span class="flat-discount-pill">Flat ₹${seasonal} OFF</span>` : ''}
            </div>

            <p style="margin-top:14px; color:var(--text-light);">${escapeHtml(product.description)}</p>

            <div class="cta-group">
                <a class="whatsapp-btn" target="_blank" href="https://wa.me/${WHATSAPP}?text=${encodeURIComponent('Hi, I want to order '+product.name)}">
                    <!-- WhatsApp SVG -->
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M20.52 3.48A11.9 11.9 0 0 0 12 .5C6.48.5 1.87 4.8.66 10.06L0.2 14.1l4.34-1.14A11.9 11.9 0 0 0 12 23.5h.01c5.52 0 10.13-4.3 11.34-9.56a11.73 11.73 0 0 0-2.83-10.46z" fill="#25D366" opacity="0.0"/><path d="M20.5 3.5a11.9 11.9 0 0 0-8.5-3C6.48.5 1.9 4.8.7 10.06l-.46 4.04L4.6 13.0A11.9 11.9 0 0 0 12 23.5c5.52 0 10.13-4.3 11.34-9.56A11.73 11.73 0 0 0 20.5 3.5z" fill="#25D366"/><path d="M16.6 15.3c-.4-.2-2.3-1.1-2.7-1.2-.4-.1-.7-.2-1 .2-.2.3-.8 1.2-1 1.5-.2.3-.4.4-.8.2-.4-.2-1.6-.6-3.1-1.9-1.1-1-1.8-2.2-2-2.6-.2-.4 0-.6.2-.8.2-.2.4-.6.6-.9.2-.3.2-.6 0-.9-.2-.3-1-2.3-1.4-3.1-.4-.8-.8-.7-1-.7H5.3c-.3 0-.8.1-1.2.6-.4.5-1.4 1.4-1.4 3.5 0 2.1 1.9 4.2 2.1 4.5.2.3 3.6 5.5 8.8 7.6 5.2 2.1 5.2 1.6 6.2 1.5.9-.1 2.8-1.1 3.2-2.4.4-1.3.4-2.4.3-2.6-.1-.2-1.1-.4-1.5-.6z" fill="#fff"/></svg>
                    Buy on WhatsApp
                </a>

                <button class="cart-btn" id="addCartBtn">
                    <!-- Cart SVG -->
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M7 4h-2l-1 2h2l3.6 7.59-1.35 2.45C8.16 16.37 8 16.68 8 17a2 2 0 1 0 4 0h4a2 2 0 1 0 4 0 1.98 1.98 0 0 0-1.5-1.94L18 13H8.42" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    Add to Cart
                </button>

                <button class="share-btn" id="shareBtn">
                    <!-- Share SVG -->
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M4 12v7a1 1 0 0 0 1 1h14" stroke="#146EB4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M16 6l-4-4-4 4" stroke="#146EB4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 2v13" stroke="#146EB4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    Share
                </button>
            </div>

            <div class="detail-table">
                <div><strong>Brand:</strong> ${escapeHtml(product.brand)}</div>
                <div><strong>SKU:</strong> ${escapeHtml(product.sku)}</div>
                <div><strong>Warranty:</strong> ${escapeHtml(product.warranty)}</div>
                <div><strong>Shipping:</strong> ${escapeHtml(shippingText)}</div>
                <div><strong>Country Of Origin:</strong> ${escapeHtml(product.country_of_origin)}</div>
                <div><strong>Status:</strong> ${stockText}</div>
                <div><strong>Estimated Delivery:</strong> ${deliveryDate.toDateString()}</div>
                <div><strong>Sold & Delivered By:</strong> Jay Mata Di Enterprises</div>
                <div><strong>Email:</strong> info@jmdmall.com</div>
                <div><strong>Phone:</strong> +977 9705446407</div>
            </div>

            <div class="assured-box">
                <h3>JMDMall Assured</h3>
                <p>✓ Easy Returns & Replacement</p>
                <p>✓ Cash On Delivery Available</p>
                <p>✓ Genuine Products</p>
                <p>✓ 24/7 Customer Support</p>
                <p>✓ Secure WhatsApp Ordering</p>
            </div>
        </div>
    </div>
    `;

    document.getElementById('productContainer').innerHTML = galleryHtml;

    // attach gallery behavior
    let currentIndex = 0;
    const mainImg = document.getElementById('mainProductImage');
    const thumbs = document.getElementById('galleryThumbs');
    const thumbNodes = thumbs.querySelectorAll('.thumb');

    function setImage(idx){
        if(idx < 0) idx = images.length -1;
        if(idx >= images.length) idx = 0;
        currentIndex = idx;
        mainImg.src = images[idx] || PLACEHOLDER;
        thumbNodes.forEach(n=>n.classList.toggle('active', Number(n.dataset.index)===idx));
        // scroll active thumb into view
        const active = thumbs.querySelector('.thumb.active');
        if(active) active.scrollIntoView({behavior:'smooth', inline:'center'});
    }

    document.getElementById('nextImg').addEventListener('click', ()=> setImage(currentIndex+1));
    document.getElementById('prevImg').addEventListener('click', ()=> setImage(currentIndex-1));

    thumbNodes.forEach(node=> node.addEventListener('click', ()=> setImage(Number(node.dataset.index))));

    // touch swipe support
    let startX = 0; let deltaX = 0;
    mainImg.addEventListener('touchstart', e=> startX = e.touches[0].clientX);
    mainImg.addEventListener('touchmove', e=> { deltaX = e.touches[0].clientX - startX; });
    mainImg.addEventListener('touchend', ()=> { if(deltaX>50) setImage(currentIndex-1); else if(deltaX<-50) setImage(currentIndex+1); deltaX = 0; });

    // add to cart click (placeholder behaviour)
    const addCartBtn = document.getElementById('addCartBtn');
    addCartBtn.addEventListener('click', ()=> { alert('Added to cart (demo)'); });

    // share button
    const shareBtn = document.getElementById('shareBtn');
    shareBtn.addEventListener('click', ()=>{
        if(navigator.share){
            navigator.share({ title: product.name, text: product.description || product.name, url: window.location.href });
        } else { navigator.clipboard.writeText(window.location.href); alert('Product link copied'); }
    });

    // preload main image for faster display
    const link = document.createElement('link');
    link.rel = 'preload';
    link.as = 'image';
    link.href = images[0] || PLACEHOLDER;
    document.head.appendChild(link);
}

function escapeHtml(text){ if(!text) return ''; return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }

loadProduct();
</script>

</body>
</html>
